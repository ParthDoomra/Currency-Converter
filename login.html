<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .login-box{
            width:420px;
            background:#fff;
            padding:40px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
            text-align:center;
        }

        .icon{
            font-size:55px;
            margin-bottom:10px;
        }

        h2{
            font-size:32px;
            color:#333;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin:12px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#007bff;
            box-shadow:0 0 8px rgba(0,123,255,0.3);
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }

        #message{
            margin-top:20px;
            font-size:15px;
            font-weight:bold;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <div class="icon">💱</div>

        <h2>Currency Converter</h2>

        <form id="login-form">

            <input
                type="text"
                id="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">Login</button>

        </form>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
